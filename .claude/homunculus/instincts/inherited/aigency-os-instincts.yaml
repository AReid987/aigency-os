# Aigency Os Workflow Multi Package Dependency Upgrade

## Action

Follow the multi-package-dependency-upgrade workflow:
1. Identify all packages and apps using the dependency.
2. Update the dependency version in each package.json.
3. Update the shared pnpm-lock.yaml file to reflect new dependency versions.
4. Commit all changed package.json files and the lockfile together.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: */package.json, pnpm-lock.yaml

