# nixpacks.toml — Railway build configuration
# Only builds the packages needed for production (web + paperclip-api)

[phases.setup]
nixPkgs = ["nodejs_22", "pnpm_9"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
cmds = [
  "pnpm --filter @vscp/shared-types build",
  "pnpm --filter @vscp/ui build",
  "pnpm --filter @vscp/api-client build",
  "pnpm --filter @vscp/paperclip-api build",
  "cd apps/web && npx vite build"
]

[start]
cmd = "node apps/server/unified-server.mjs"
