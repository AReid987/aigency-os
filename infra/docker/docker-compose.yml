# aigency-os infrastructure services
# Usage: docker compose -f infra/docker/docker-compose.yml up -d

x-service-defaults: &service-defaults
  image: node:22-alpine
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "wget", "--spider", "-q", "http://localhost:${PORT}/health"]
    interval: 15s
    timeout: 5s
    retries: 3
    start_period: 30s
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - aigency-net

services:
  # -- Infrastructure -----------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: aigency-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aigency}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aigency_dev}
      POSTGRES_DB: ${POSTGRES_DB:-aigency}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aigency} -d ${POSTGRES_DB:-aigency}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - aigency-net

  redis:
    image: redis:7-alpine
    container_name: aigency-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - aigency-net

  # -- API Services -------------------------------------------------
  paperclip-api:
    <<: *service-defaults
    container_name: aigency-paperclip-api
    working_dir: /app/services/paperclip-api
    command: ["npx", "tsx", "src/index.ts"]
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-aigency}
      POSTGRES_DB: ${POSTGRES_DB:-aigency}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ../../services/paperclip-api:/app/services/paperclip-api:cached
      - ../../packages:/app/packages:cached

  bmad:
    <<: *service-defaults
    container_name: aigency-bmad
    working_dir: /app/services/bmad
    command: ["npx", "tsx", "src/index.ts"]
    ports:
      - "3010:3010"
    environment:
      PORT: "3010"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-aigency}
      POSTGRES_DB: ${POSTGRES_DB:-aigency}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ../../services/bmad:/app/services/bmad:cached
      - ../../packages:/app/packages:cached

  paul:
    <<: *service-defaults
    container_name: aigency-paul
    working_dir: /app/services/paul
