[build]
buildCommand = "pnpm install && find . -name '*.tsbuildinfo' -delete && rm -rf packages/*/dist apps/*/dist && pnpm --filter @aigency-os/shared-types build && pnpm --filter @aigency-os/ui build && pnpm --filter @aigency-os/api-client build && pnpm --filter @aigency-os/paperclip-api build && pnpm --filter @aigency-os/bmad build && pnpm --filter @aigency-os/paul build && pnpm --filter @aigency-os/gstack build && pnpm --filter @aigency-os/denchclaw build && pnpm --filter @aigency-os/hcom-api build && pnpm --filter @aigency-os/gbrain build && pnpm --filter @aigency-os/aegis build && pnpm --filter @aigency-os/plannotator build && pnpm --filter @aigency-os/skills build && cd apps/web && npx vite build"
startCommand = "node apps/server/unified-server.mjs"
provider = "nixpacks"
