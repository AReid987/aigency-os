[build]
buildCommand = "pnpm install && find . -name '*.tsbuildinfo' -delete && rm -rf packages/*/dist services/*/dist && pnpm --filter @vscp/shared-types build && pnpm --filter @vscp/ui build && pnpm --filter @vscp/api-client build && pnpm --filter @vscp/paperclip-api build && pnpm --filter @vscp/bmad build && pnpm --filter @vscp/paul build && pnpm --filter @vscp/gstack build && pnpm --filter @vscp/denchclaw build && pnpm --filter @vscp/hcom-api build && pnpm --filter @vscp/gbrain build && pnpm --filter @vscp/aegis build && pnpm --filter @vscp/plannotator build && pnpm --filter @vscp/skills build && cd apps/web && npx vite build"
startCommand = "node unified-server.mjs"
provider = "nixpacks"
