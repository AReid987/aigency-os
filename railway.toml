[build]
buildCommand = "pnpm install && rm -rf packages/shared-types/dist packages/shared-types/*.tsbuildinfo packages/ui/dist packages/ui/*.tsbuildinfo packages/api-client/dist packages/api-client/*.tsbuildinfo services/paperclip-api/dist services/paperclip-api/*.tsbuildinfo && pnpm --filter @vscp/shared-types build && pnpm --filter @vscp/ui build && pnpm --filter @vscp/api-client build && pnpm --filter @vscp/paperclip-api build && cd apps/web && npx vite build"
startCommand = "node services/paperclip-api/dist/server.js"
provider = "nixpacks"
